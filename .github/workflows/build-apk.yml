name: 云端打包 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # ✅ 已升级
      - name: 设置 Python
        uses: actions/setup-python@v5      # ✅ 已升级
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 构建 APK
        run: |
          flet build apk --verbose

      - name: 上传 APK
        uses: actions/upload-artifact@v4   # 这个没问题
        with:
          name: NT-calculator-apk
          path: build/apk/*.apk
